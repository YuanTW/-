name: 通知 — Macro US Stock

on:
  schedule:
    # 台灣時間每個工作日晚上 21:00 = UTC 13:00
    - cron: '0 13 * * 1-5'
  workflow_dispatch:   # 可在 GitHub Actions 頁面手動觸發

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許寫回 strategy_states.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install --quiet \
            jupyter nbconvert \
            pandas numpy pytz requests \
            yfinance matplotlib plotly

      - name: 執行策略並發送 Telegram 通知
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notify_runner.py Macro_US_Stock.ipynb macro_us

      - name: 儲存方向狀態回 repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_states.json
          git diff --staged --quiet || git commit -m "chore: update strategy state [skip ci]"
          git push
